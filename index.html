<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Online TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #0f0f12;
            --bg-sidebar: #16161f;
            --bg-card: #20202b;
            --bg-card-hover: #2b2b3a;
            --accent: #7c4dff;
            --accent-hover: #673ab7;
            --danger: #ff5252;
            --text-color: #efefef;
            --text-dim: #8a8a9e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
        }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .sidebar {
            width: 320px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-header h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box {
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
        }

        .search-box input {
            width: 100%;
            padding: 10px 10px 10px 35px;
            background-color: var(--bg-card);
            border: 1px solid transparent;
            border-radius: 8px;
            color: var(--text-color);
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: var(--accent);
            background-color: var(--bg-card-hover);
        }

        .channels-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .channels-list::-webkit-scrollbar { width: 6px; }
        .channels-list::-webkit-scrollbar-thumb { background: var(--bg-card); border-radius: 4px; }

        .channel-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            background-color: var(--bg-card);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .channel-item:hover { background-color: var(--bg-card-hover); transform: translateX(2px); }
        .channel-item.active { background-color: rgba(124, 77, 255, 0.15); border-color: var(--accent); }

        .channel-logo {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            object-fit: contain;
            background: rgba(255, 255, 255, 0.03);
            padding: 3px;
        }

        .channel-info { flex: 1; overflow: hidden; }
        .channel-name { font-weight: 500; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-main);
        }

        .player-header {
            min-height: 70px;
            padding: 10px 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-color: var(--bg-sidebar);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #current-logo { width: 35px; height: 35px; object-fit: contain; }
        #current-title { font-size: 1.1rem; font-weight: 600; }

        #error-log {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 5px;
            font-weight: bold;
            display: none;
        }

        .video-container {
            flex: 1;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        video { width: 100%; height: 100%; max-height: 100vh; outline: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-tv" style="color: var(--accent);"></i> Онлайн ТВ</h2>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search" placeholder="Поиск канала...">
                </div>
            </div>
            <div class="channels-list" id="channels-list"></div>
        </div>

        <div class="main-content">
            <div class="player-header">
                <div class="header-info">
                    <img id="current-logo" src="" alt="" style="display: none;">
                    <span id="current-title">Выберите телеканал для просмотра</span>
                </div>
                <div id="error-log"></div>
            </div>
            <div class="video-container">
                <video id="video" controls autoplay playsinline></video>
            </div>
        </div>
    </div>

    <script>
        // URL твоего Cloudflare прокси
        const PROXY_URL = "https://ancient-voice-d325.jabatukhashvili.workers.dev/?url=";

        const channels = [
            {
                name: "1 Arkhi HD",
                url: "https://tv.cdn.xsg.ge/gpb-1tv/index.m3u8",
                useProxy: false
            },
            {
                name: "1 Arxi Sport (2tv)",
                url: "http://tv.cdn.xsg.ge/gpb-2tv/tracks-v1a1/mono.m3u8",
                useProxy: false
            },
            {
                name: "Marao",
                url: "https://nexytv.net/st_marao_9086/tracks-v1a1/mono.ts.m3u8",
                useProxy: false
            },
            {
                name: "Rustavi 2 HD",
                url: "https://tv.cdn.xsg.ge/rustavi2/index.m3u8",
                useProxy: false
            },
            {
                name: "⚽ Setanta 1 (Напрямую)",
                url: "http://178.134.1.158:8081/setanta1/index.m3u8",
                useProxy: false
            },
            {
                name: "⚽ Setanta 1 (Через Прокси)",
                url: "http://178.134.1.158:8081/setanta1/index.m3u8",
                useProxy: true
            },
            {
                name: "⚽ Setanta 3 (Напрямую)",
                url: "http://178.134.1.158:8081/setanta3/index.m3u8",
                useProxy: false
            },
            {
                name: "⚽ Setanta 3 (Через Прокси)",
                url: "http://178.134.1.158:8081/setanta3/index.m3u8",
                useProxy: true
            }
        ];

        const video = document.getElementById('video');
        const channelsList = document.getElementById('channels-list');
        const searchInput = document.getElementById('search');
        const errorLog = document.getElementById('error-log');
        let hls = null;

        function renderChannels(channelsToRender) {
            channelsList.innerHTML = '';
            channelsToRender.forEach(channel => {
                const item = document.createElement('div');
                item.className = 'channel-item';
                item.innerHTML = `
                    <div class="channel-logo" style="display:flex; align-items:center; justify-content:center;"><i class="fas fa-play" style="color: var(--text-dim); font-size: 0.8rem;"></i></div>
                    <div class="channel-info"><div class="channel-name">${channel.name}</div></div>
                `;
                item.addEventListener('click', () => playChannel(channel, item));
                channelsList.appendChild(item);
            });
        }

        function playChannel(channel, element) {
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            if (element) element.classList.add('active');

            document.getElementById('current-title').textContent = channel.name;
            errorLog.style.display = 'none';
            errorLog.innerText = '';

            video.muted = false;
            
            // Если useProxy = true, пускаем через починенный Cloudflare. Если false - напрямую.
            const finalUrl = channel.useProxy ? (PROXY_URL + encodeURIComponent(channel.url)) : channel.url;

            if (Hls.isSupported()) {
                if (hls) hls.destroy();
                hls = new Hls();
                hls.loadSource(finalUrl);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => { video.muted = true; video.play(); });
                });

                hls.on(Hls.Events.ERROR, function (event, data) {
                    errorLog.style.display = 'block';
                    let details = `Ошибка: ${data.details}`;
                    if (data.response) details += ` (Статус: ${data.response.code})`;
                    errorLog.innerText = `⚠️ ${details}`;
                    
                    if (data.fatal) hls.startLoad();
                });

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = finalUrl;
                video.addEventListener('loadedmetadata', () => { video.play(); });
            }
        }

        video.onerror = function() {
            if (video.error) {
                errorLog.style.display = 'block';
                errorLog.innerText = `⚠️ Ошибка встроенного плеера. Код: ${video.error.code}`;
            }
        };

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            const filtered = channels.filter(c => c.name.toLowerCase().includes(query));
            renderChannels(filtered);
        });

        renderChannels(channels);
    </script>
</body>
</html>
