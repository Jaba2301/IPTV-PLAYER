<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ელენე ტვ - IPTV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #0a0b10;
            --bg-card: #141622;
            --accent-neon: #ffd700; /* Золотой/желтый акцент под цвет футболки */
            --accent-cyan: #00ffcc; /* Бирюзовый для подсветки */
            --text-light: #ffffff;
            --text-dim: #70798c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Noto Sans Georgian', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        /* Красивое неоновое название */
        h1 {
            font-family: 'Noto Sans Georgian', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3), 0 0 20px rgba(0, 255, 204, 0.2);
            letter-spacing: 1px;
        }

        .subtitle {
            color: var(--text-dim);
            margin-bottom: 30px;
            font-size: 1rem;
            font-weight: 400;
        }

        /* Блок с твоей картинкой */
        .image-box {
            width: 100%;
            max-width: 320px;
            margin: 0 auto 35px auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 215, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .image-box:hover {
            transform: scale(1.02);
            border-color: var(--accent-cyan);
        }

        .image-box img {
            width: 100%;
            display: block;
            object-fit: cover;
        }

        /* Список каналов */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .channel-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-card);
            color: var(--text-light);
            text-decoration: none;
            padding: 18px 24px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            font-size: 1.1rem;
        }

        .channel-link:hover {
            transform: translateY(-3px);
            border-color: var(--accent-cyan);
            box-shadow: 0 8px 20px rgba(0, 255, 204, 0.15);
            color: var(--accent-cyan);
        }

        .channel-link i.fa-external-link-alt {
            font-size: 1rem;
            color: var(--text-dim);
            transition: color 0.2s;
        }

        .channel-link:hover i.fa-external-link-alt {
            color: var(--accent-cyan);
        }

        .channel-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .channel-info i:first-child {
            width: 24px;
            text-align: center;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ელენე ტვ</h1>
        <div class="subtitle">ონლაინ ტელევიზია • Стримы ТВ каналов</div>

        <div class="image-box">
            <img src="http://googleusercontent.com/image_generation_content/1" alt="ელენე ტვ">
        </div>

        <div class="links-list" id="links-container"></div>
    </div>

    <script>
        // Твои каналы
        const channels = [
            { name: "⚽ Setanta Sports 1", url: "http://178.134.1.158:8081/setanta1/index.m3u8", icon: "fas fa-football-ball" },
            { name: "⚽ Setanta Sports 3", url: "http://178.134.1.158:8081/setanta3/index.m3u8", icon: "fas fa-football-ball" },
            { name: "1 Arkhi HD", url: "https://tv.cdn.xsg.ge/gpb-1tv/index.m3u8", icon: "fas fa-tv" },
            { name: "1 Arxi Sport (2tv)", url: "http://tv.cdn.xsg.ge/gpb-2tv/tracks-v1a1/mono.m3u8", icon: "fas fa-running" },
            { name: "Rustavi 2 HD", url: "https://tv.cdn.xsg.ge/rustavi2/index.m3u8", icon: "fas fa-tv" },
            { name: "Marao", url: "https://nexytv.net/st_marao_9086/tracks-v1a1/mono.ts.m3u8", icon: "fas fa-smile" }
        ];

        const container = document.getElementById('links-container');

        channels.forEach(channel => {
            const a = document.createElement('a');
            a.className = 'channel-link';
            a.href = channel.url;
            a.target = '_blank'; // Открывать в новой вкладке
            
            a.innerHTML = `
                <div class="channel-info">
                    <i class="${channel.icon}"></i>
                    <span>${channel.name}</span>
                </div>
                <i class="fas fa-external-link-alt"></i>
            `;
            
            container.appendChild(a);
        });
    </script>
</body>
</html>
