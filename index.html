<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ელენე ტვ - IPTV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #0a0b10;
            --bg-card: #141622;
            --accent-neon: #00ffcc;
            --accent-glow: rgba(0, 255, 204, 0.3);
            --text-light: #ffffff;
            --text-dim: #70798c;
            --shirt-color: #ffd700;
            --shorts-color: #0057b7;
            --skin-color: #ffdbac;
            --hair-color: #4b3621;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Noto Sans Georgian', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-family: 'Noto Sans Georgian', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: #fff;
            text-shadow: 0 0 10px var(--accent-glow), 0 0 20px var(--accent-glow);
            letter-spacing: 1px;
        }

        .subtitle {
            color: var(--text-dim);
            margin-bottom: 35px;
            font-size: 1rem;
            font-weight: 400;
        }

        .animation-box {
            position: relative;
            width: 200px;
            height: 220px;
            margin: 0 auto 40px auto;
        }

        .ball {
            position: absolute;
            width: 24px;
            height: 24px;
            background: radial-gradient(circle, #fff 70%, #bbb 100%);
            border-radius: 50%;
            border: 2px solid #000;
            left: 52px;
            bottom: 45px;
            z-index: 10;
            animation: bounceBall 1s infinite ease-in-out;
        }

        .ball::before {
            content: '⚽';
            position: absolute;
            font-size: 16px;
            top: -1px;
            left: 2px;
        }

        .juggler {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 40px;
        }

        .hair {
            position: absolute;
            width: 30px;
            height: 40px;
            background-color: var(--hair-color);
            border-radius: 50% 50% 20% 20%;
            top: 18px;
            left: 68px;
        }

        .ponytail {
            position: absolute;
            width: 22px;
            height: 18px;
            background-color: var(--hair-color);
            border-radius: 50%;
            top: 22px;
            left: 94px;
            transform: rotate(-20deg);
        }

        .head {
            position: absolute;
            width: 24px;
            height: 26px;
            background-color: var(--skin-color);
            border-radius: 50%;
            top: 23px;
            left: 71px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Добавляем лицо: глаза и улыбку */
        .face {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .eye {
            position: absolute;
            width: 3px;
            height: 3px;
            background-color: #333;
            border-radius: 50%;
            top: 10px;
        }

        .eye.left {
            left: 6px;
        }

        .eye.right {
            right: 6px;
        }

        .smile {
            position: absolute;
            width: 10px;
            height: 5px;
            border: 2px solid #333;
            border-radius: 0 0 10px 10px;
            border-top: none;
            bottom: 6px;
            left: 7px;
        }

        .shirt {
            position: absolute;
            width: 30px;
            height: 48px;
            background-color: var(--shirt-color);
            border-radius: 8px 8px 0 0;
            top: 47px;
            left: 68px;
            transform: rotate(-5deg);
        }

        .shorts {
            position: absolute;
            width: 32px;
            height: 22px;
            background-color: var(--shorts-color);
            border-radius: 0 0 5px 5px;
            top: 93px;
            left: 66px;
        }

        .leg-left {
            position: absolute;
            width: 9px;
            height: 62px;
            background-color: var(--skin-color);
            top: 113px;
            left: 82px;
            border-radius: 0 0 5px 5px;
        }

        .leg-left::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 9px;
            background-color: #fff;
            border: 1px solid #000;
            bottom: -5px;
            left: -1px;
            border-radius: 5px 5px 0 0;
        }

        .leg-right {
            position: absolute;
            width: 9px;
            height: 42px;
            background-color: var(--skin-color);
            top: 113px;
            left: 64px;
            transform-origin: top center;
            animation: kickLeg 1s infinite ease-in-out;
            border-radius: 0 0 3px 3px;
        }

        .leg-right-shin {
            position: absolute;
            width: 9px;
            height: 27px;
            background-color: var(--skin-color);
            bottom: -25px;
            left: 0;
            transform-origin: top center;
            transform: rotate(25deg);
        }

        .leg-right-shin::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 9px;
            background-color: #fff;
            border: 1px solid #000;
            bottom: -6px;
            left: -5px;
            border-radius: 5px;
        }

        .arm {
            position: absolute;
            width: 8px;
            height: 42px;
            background-color: var(--skin-color);
            top: 48px;
            left: 61px;
            border-radius: 5px;
            transform: rotate(20deg);
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .channel-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-card);
            color: var(--text-light);
            text-decoration: none;
            padding: 16px 22px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            font-size: 1.05rem;
        }

        .channel-link:hover {
            transform: translateY(-3px);
            border-color: var(--accent-neon);
            box-shadow: 0 8px 20px rgba(0, 255, 204, 0.15);
            color: var(--accent-neon);
        }

        .channel-link i.fa-external-link-alt {
            font-size: 1rem;
            color: var(--text-dim);
            transition: color 0.2s;
        }

        .channel-link:hover i.fa-external-link-alt {
            color: var(--accent-neon);
        }

        .channel-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .channel-info i:first-child {
            width: 20px;
            text-align: center;
        }

        @keyframes bounceBall {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-75px); }
        }

        @keyframes kickLeg {
            0%, 100% { transform: rotate(15deg); }
            50% { transform: rotate(-10deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ელენე ტვ</h1>
        <div class="subtitle">ონლაინ ტელევიზია • Стримы ТВ каналов</div>

        <div class="animation-box">
            <div class="ball"></div>
            <div class="juggler">
                <div class="hair"></div>
                <div class="ponytail"></div>
                <div class="head">
                    <div class="face">
                        <div class="eye left"></div>
                        <div class="eye right"></div>
                        <div class="smile"></div>
                    </div>
                </div>
                <div class="arm"></div>
                <div class="shirt"></div>
                <div class="shorts"></div>
                <div class="leg-left"></div>
                <div class="leg-right">
                    <div class="leg-right-shin"></div>
                </div>
            </div>
        </div>

        <div class="links-list" id="links-container"></div>
    </div>

    <script>
        const channels = [
            { name: "⚽ Setanta Sports 1", url: "http://178.134.1.158:8081/setanta1/index.m3u8", icon: "fas fa-football-ball" },
            { name: "⚽ Setanta Sports 3", url: "http://178.134.1.158:8081/setanta3/index.m3u8", icon: "fas fa-football-ball" },
            { name: "1 Arkhi HD", url: "https://tv.cdn.xsg.ge/gpb-1tv/index.m3u8", icon: "fas fa-tv" },
            { name: "1 Arxi Sport (2tv)", url: "http://tv.cdn.xsg.ge/gpb-2tv/tracks-v1a1/mono.m3u8", icon: "fas fa-running" },
            { name: "Rustavi 2 HD", url: "https://tv.cdn.xsg.ge/rustavi2/index.m3u8", icon: "fas fa-tv" },
            { name: "Marao", url: "https://nexytv.net/st_marao_9086/tracks-v1a1/mono.ts.m3u8", icon: "fas fa-smile" }
        ];

        const container = document.getElementById('links-container');

        channels.forEach(channel => {
            const a = document.createElement('a');
            a.className = 'channel-link';
            a.href = channel.url;
            a.target = '_blank';
            
            a.innerHTML = `
                <div class="channel-info">
                    <i class="${channel.icon}"></i>
                    <span>${channel.name}</span>
                </div>
                <i class="fas fa-external-link-alt"></i>
            `;
            
            container.appendChild(a);
        });
    </script>
</body>
</html>
